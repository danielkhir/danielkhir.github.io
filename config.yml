baseURL: "https://danielmuhd.dev/"
title: danielmuhd
paginate: 5
theme: PaperMod

enableRobotsTXT: true
enableEmoji: true
buildDrafts: false
buildFuture: false
buildExpired: false

minify:
  disableXML: true
  minifyOutput: true

taxonomies:
  tag: tags

params:
  env: production
  title: danielmuhd
  description: "Personal website"
  keywords: [Blog, Portfolio, PaperMod]
  author: danielmuhd
  DateFormat: "January 2, 2006"
  defaultTheme: dark # auto, dark, light
  disableThemeToggle: true

  ShowReadingTime: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: false
  ShowCodeCopyButtons: true
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: false
  tocopen: false
  enableGitInfo: true

  assets:
    # disableHLJS: true # to disable highlight.js
    # disableFingerprinting: true
    favicon: "/assets/favicon.ico"
    favicon16x16:  "/assets/favicon-16x16.png"
    favicon32x32:  "/assets/favicon-32x32.png"
    apple_touch_icon:  "/assets/apple-touch-icon.png"
    safari_pinned_tab:  "/assets/safari-pinned-tab.svg"

  # label:
  #   text: "danielmuhd"
  #   icon: /apple-touch-icon.png
  #   iconHeight: 35

  # home-info mode
  homeInfoParams:
    Title: "Hi, I'm Daniel. \U0001F44B"
    Content: |
      I'm a CS student, part-time software developer, and full-time nerd.

      This is my personal website. Sometimes I write about stuff that interests me.

      [More about me.](/about)

  socialIcons:
    - name: github
      url: "https://github.com/danielmuhd"
    - name: linkedin
      url: "https://linkedin.com/in/danielmuhd"

  cover:
    hidden: true # hide everywhere but not in structured data
    hiddenInList: true # hide on list pages and home
    hiddenInSingle: true # hide on single page

menu:
  main:
    - identifier: about
      name: about
      url: /about/
      weight: 10
    - identifier: archives
      name: archives
      url: /archives/
      weight: 10
    - identifier: tags
      name: tags
      url: /tags/
      weight: 10

# Read: https://github.com/adityatelange/hugo-PaperMod/wiki/FAQs#using-hugos-syntax-highlighter-chroma
pygmentsUseClasses: true
markup:
  highlight:
    noClasses: false
    # anchorLineNos: true
    # codeFences: true
    # guessSyntax: true
    # lineNos: true
    # style: monokai
